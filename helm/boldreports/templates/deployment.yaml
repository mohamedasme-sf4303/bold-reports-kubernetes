{{- range $service := .Values.instanceConfig}}
{{- /* Define PV check ONCE here — reuse $hasRealPV everywhere */ -}}
{{- $hasRealPV := or
    $.Values.persistentVolume.useExistingClaim
    (and (eq $.Values.clusterProvider "onpremise")
         (ne (default "" $.Values.persistentVolume.onpremise.hostPath) ""))
    (and (eq $.Values.clusterProvider "aks")
         (or (ne (default "" $.Values.persistentVolume.aks.nfs.fileShareName) "")
             (ne (default "" $.Values.persistentVolume.aks.fileShareName) "")))
    (and (eq $.Values.clusterProvider "eks")
         (ne (default "" $.Values.persistentVolume.eks.efsFileSystemId) ""))
    (and (eq $.Values.clusterProvider "gke")
         (and (ne (default "" $.Values.persistentVolume.gke.fileShareIp) "")
              (ne (default "" $.Values.persistentVolume.gke.fileShareName) "")))
    (and (eq $.Values.clusterProvider "ack")
         (ne (default "" $.Values.persistentVolume.ack.serverName) ""))
    (and (eq $.Values.clusterProvider "oke")
         (or (ne (default "" $.Values.persistentVolume.oke.volumeHandle) "")
             (and $.Values.persistentVolume.oke.blockVolume.blockVolumeEnable
                  (ne (default "" $.Values.persistentVolume.oke.blockVolume.blockVolumeCapacity) ""))))
-}}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    helm.sh/chart: {{ $.Chart.Name }}_{{ $.Chart.Version }}
    app.kubernetes.io/name: {{ $service.app }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
    {{- if $.Chart.AppVersion }}
    app.kubernetes.io/version: {{ $.Chart.AppVersion | quote }}
    {{- end }}
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
  name: {{ $service.app }}-deployment
  {{- if eq $.Release.Namespace "default" }}
  namespace: {{ $.Values.namespace }}
  {{- else }}
  namespace: {{ $.Release.Namespace }}
  {{- end }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $service.app }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
  replicas: {{ $service.replicaCount }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $service.app }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
    spec:
      {{- if ne $service.app "id-web" }}
      initContainers:
      - name: id-web-initialization
        {{- if and (hasKey $.Values "initContainersImage") (hasKey $.Values.initContainersImage "initContainersRepo") (hasKey $.Values.initContainersImage "initContainersTag") }}
        image: "{{ $.Values.initContainersImage.initContainersRepo }}:{{ $.Values.initContainersImage.initContainersTag }}"
        {{- else }}
        image: "busybox:1.28"
        {{- end }}
        command: ["/bin/sh","-c"]
        {{- if and $hasRealPV (not ($.Values.ociStorage.enabled | default false)) }}
        args: ["while [ ! -f /application/app_data/configuration/config.json ] || [ ! -f /application/app_data/configuration/privatekeys.dat ]; do echo 'Waiting for required files...'; sleep 10; done; echo 'Both config.json and privatekeys.dat files exist.'"]
        {{- else }}
        args: ["echo 'Waiting for id-web service...'; while ! nc -z id-web-service 6000; do echo 'Still waiting...'; sleep 10; done; echo 'id-web is ready'"]
        {{- end }}
        {{- if $hasRealPV }}
        volumeMounts:
        - mountPath: /application/app_data
          name: {{ $service.app }}-volume
        {{- end }}
      {{- end }}
      {{- if $.Values.imagePullSecrets }}
      imagePullSecrets:
      - name: {{ $.Values.imagePullSecrets }}
      {{- end }}
      containers:
      - name: {{ $service.app }}-container
        {{- if eq $service.app "id-web" }}
        image: "{{ $.Values.image.idRepo }}/bold-identity:{{ $.Values.image.idTag }}"
        {{- else if eq $service.app "id-api" }}
        image: "{{ $.Values.image.idRepo }}/bold-idp-api:{{ $.Values.image.idTag }}"
        {{- else if eq $service.app "id-ums" }}
        image: "{{ $.Values.image.idRepo }}/bold-ums:{{ $.Values.image.idTag }}"
        {{- else if eq $service.app "reports-web" }}
        image: "{{ $.Values.image.reportsRepo }}/boldreports-server:{{ $.Values.image.reportsTag }}"
        {{- else if eq $service.app "reports-api" }}
        image: "{{ $.Values.image.reportsRepo }}/boldreports-server-api:{{ $.Values.image.reportsTag }}"
        {{- else if eq $service.app "reports-jobs" }}
        image: "{{ $.Values.image.reportsRepo }}/boldreports-server-jobs:{{ $.Values.image.reportsTag }}"
        {{- else if eq $service.app "reports-reportservice" }}
        image: "{{ $.Values.image.reportsRepo }}/boldreports-designer:{{ $.Values.image.reportsTag }}"
        {{- else if eq $service.app "reports-viewer" }}
        image: "{{ $.Values.image.reportsRepo }}/boldreports-viewer:{{ $.Values.image.reportsTag }}"
        {{- else if eq $service.app "bold-etl" }}
        image: "{{ $.Values.image.reportsRepo }}/bold-etl:{{ $.Values.image.reportsTag }}"
        {{- end }}
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: {{ $service.cpuResourceRequests }}
            memory: {{ $service.memoryResourceRequests }}
        env:
        - name: BOLD_SERVICES_HOSTING_ENVIRONMENT
          value: k8s
        {{- if $hasRealPV }}
        - name: BOLD_SERVICES_PV_USED
          value: "true"
        {{- else }}
        - name: BOLD_SERVICES_PV_USED
          value: "false"
        {{- end }}
        {{- if and (hasKey $.Values "ociStorage") (hasKey $.Values.ociStorage "enabled") ( $.Values.ociStorage.enabled | default false ) }}
        - name: BOLD_SERVICES_OCI_ACCESS_KEY
          value: "{{ $.Values.ociStorage.accessKey | default "" }}"
        - name: OCI_ACCESS_KEY
          value: "{{ $.Values.ociStorage.accessKey | default "" }}"
        - name: BOLD_SERVICES_OCI_BUCKET_NAME
          value: "{{ $.Values.ociStorage.bucketName | default "" }}"
        - name: BOLD_SERVICES_OCI_NAME_SPACE
          value: "{{ $.Values.ociStorage.namespace | default "" }}"
        - name: BOLD_SERVICES_OCI_REGION
          value: "{{ $.Values.ociStorage.region | default "" }}"
        - name: OCI_REGION
          value: "{{ $.Values.ociStorage.region | default "" }}"
        - name: BOLD_SERVICES_OCI_ROOTFOLDER_NAME
          value: "{{ $.Values.ociStorage.rootFolderName | default "" }}"
        - name: BOLD_SERVICES_OCI_SECRET_KEY
          value: "{{ $.Values.ociStorage.secretKey | default "" }}"
        - name: OCI_SECRET_KEY
          value: "{{ $.Values.ociStorage.secretKey | default "" }}"
        - name: BOLD_SERVICES_STORAGETYPE
          value: "{{ $.Values.ociStorage.storageType | default "" }}"
        {{- end }}
        {{- if and (hasKey $.Values "s3Storage") (hasKey $.Values.s3Storage "enabled") ( $.Values.s3Storage.enabled | default false ) }}
        - name: BOLD_SERVICES_AWS_ACCESS_KEY_ID
          value: "{{ $.Values.s3Storage.accessKey | default "" }}"
        - name: BOLD_SERVICES_AMAZON_BUCKET_NAME
          value: "{{ $.Values.s3Storage.bucketName | default "" }}"
        - name: BOLD_SERVICES_AWS_REGION
          value: "{{ $.Values.s3Storage.region | default "" }}"
        - name: BOLD_SERVICES_AMAZON_ROOTFOLDER_NAME
          value: "{{ $.Values.s3Storage.rootFolderName | default "" }}"
        - name: BOLD_SERVICES_AWS_SECRET_ACCESS_KEY
          value: "{{ $.Values.s3Storage.secretKey | default "" }}"
        - name: BOLD_SERVICES_STORAGETYPE
          value: "{{ $.Values.s3Storage.storageType | default "" }}"
        {{- end }}
        {{- if and (hasKey $.Values "azureStorage") (hasKey $.Values.azureStorage "enabled") ( $.Values.azureStorage.enabled | default false ) }}
        - name: BOLD_SERVICES_AZUREBLOB_ACCESSKEY
          value: "{{ $.Values.azureStorage.accessKey | default "" }}"
        - name: BOLD_SERVICES_AZUREBLOB_ACCOUNT_NAME
          value: "{{ $.Values.azureStorage.accountName | default "" }}"
        - name: BOLD_SERVICES_AZUREBLOB_CONTAINER_NAME
          value: "{{ $.Values.azureStorage.containerName | default "" }}"
        - name: BOLD_SERVICES_AZUREBLOB_CONNECTION_TYPE
          value: "{{ $.Values.azureStorage.connectionType | default "" }}"
        - name: BOLD_SERVICES_AZUREBLOB_STORAGE_URI
          value: "{{ $.Values.azureStorage.storageUri | default "" }}"
        - name: BOLD_SERVICES_STORAGETYPE
          value: "{{ $.Values.azureStorage.storageType | default "" }}"
        {{- end }}
        - name: APP_BASE_URL
          value: {{ $.Values.appBaseUrl }}
        {{- if $.Values.optionalLibs }}
        - name: INSTALL_OPTIONAL_LIBS
          value: {{ $.Values.optionalLibs }}
        {{- end }}
        {{- if eq $service.app "id-ums" }}
        - name: BOLD_SERVICES_USE_SITE_IDENTIFIER
          value: "true"
        envFrom:
        - secretRef:
              name: bold-user-secret
        - secretRef:
              name: bold-db-secret
        - secretRef:
              name: bold-license-key
        - configMapRef:
              name: branding-config
              optional: true
        {{- end }}
        readinessProbe:
          httpGet:
            path: /health-check
            port: 80
          {{- if eq $service.app "id-web" }}
          initialDelaySeconds: 60
          {{- else }}
          initialDelaySeconds: 60
          {{- end }}
          periodSeconds: 10
          timeoutSeconds: 10
        volumeMounts:
        {{- if $hasRealPV }}
        - mountPath: /application/app_data
          name: {{ $service.app }}-volume
        {{- end }}
        {{- if eq $service.app "id-web" }}
        - mountPath: /application/idp/web/logs/k8s
        {{- else if eq $service.app "id-api" }}
        - mountPath: /application/idp/api/logs/k8s
        {{- else if eq $service.app "id-ums" }}
        - mountPath: /application/idp/ums/logs/k8s
        {{- else if eq $service.app "reports-web" }}
        - mountPath: /application/reporting/web/logs
        {{- else if eq $service.app "reports-api" }}
        - mountPath: /application/reporting/api/logs
        {{- else if eq $service.app "reports-jobs" }}
        - mountPath: /application/reporting/jobs/logs
        {{- else if eq $service.app "reports-reportservice" }}
        - mountPath: /application/reporting/reportservice/logs
        {{- else if eq $service.app "reports-viewer" }}
        - mountPath: /application/reporting/viewer/logs
        {{- else if eq $service.app "bold-etl" }}
        - mountPath: /application/etl/etlservice/logs/k8s
        {{- end }}
          name: log4net-config-volume
      volumes:
      {{- if $hasRealPV }}
      - name: {{ $service.app }}-volume
        persistentVolumeClaim:
          claimName: {{ $.Values.persistentVolume.name }}-claim
          readOnly: false
      {{- end }}
      - name: log4net-config-volume
        configMap:
          name: log4net-config
      {{- if $.Values.tolerationEnable }}
      tolerations:
        {{- range $.Values.tolerations }}
        - key: "{{ .key }}"
          operator: "{{ .operator }}"
          {{- if .value }}
          value: "{{ .value }}"
          {{- end }}
          effect: "{{ .effect }}"
        {{- end }}
      {{- end }}
      {{- if or $.Values.nodeAffinityEnable $.Values.podAffinityEnable $.Values.podAntiAffinityEnable}}
      affinity:
        {{- if $.Values.nodeAffinityEnable }}
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: "{{ $.Values.nodeAffinity.key }}"
                operator: "{{ $.Values.nodeAffinity.operator }}"
                values:
                - "{{ $.Values.nodeAffinity.value }}"
        {{- end }} 
        {{- if $.Values.podAffinityEnable }}
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: "app.kubernetes.io/name" 
                operator: "In"
                values:
                - "{{ $service.app }}"
            topologyKey: "kubernetes.io/hostname"
        {{- end }}
        {{- if $.Values.podAntiAffinityEnable }}
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: "app.kubernetes.io/name" 
                operator: "In"
                values:
                - "{{ $service.app }}"
            topologyKey: "kubernetes.io/hostname"   
        {{- end }}                
      {{- end }}
---
{{- end }}
