piVersion: alb.networking.azure.io/v1
kind: RoutePolicy
metadata:
  name: bold-affinity-policy
  namespace: bold-services
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: bold-main-route
  default:
    timeouts:
      request: 300s
    sessionAffinity:
      affinityType: application-cookie
      cookieName: bold.k8s.pod.id
      cookieDuration: 3600s
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bold-main-route
  namespace: bold-services
spec:
#   hostnames:
#   - "example.com"
  parentRefs:
    - name: <gateway-name>          # e.g., appgw-gateway
      namespace: <gateway-namespace> # e.g., default
      sectionName: <listener-name>         # Azure ALB Listener name (http or https)
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /reporting/api
    backendRefs:
    - name: reports-api-service
      port: 6551
  - matches:
    - path:
        type: PathPrefix
        value: /reporting/jobs
    backendRefs:
    - name: reports-jobs-service
      port: 6552
  - matches:
    - path:
        type: PathPrefix
        value: /reporting/reportservice
    backendRefs:
    - name: reports-reportservice-service
      port: 6553
  - matches:
    - path:
        type: PathPrefix
        value: /reporting/viewer
    backendRefs:
    - name: reports-viewer-service
      port: 6554
  - matches:
    - path:
        type: PathPrefix
        value: /reporting
    backendRefs:
    - name: reports-web-service
      port: 6550
  - matches:
    - path:
        type: PathPrefix
        value: /api
    backendRefs:
    - name: id-api-service
      port: 6001
  - matches:
    - path:
        type: PathPrefix
        value: /ums
    backendRefs:
    - name: id-ums-service
      port: 6002
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: id-web-service
      port: 6000
  - matches:
    - path:
        type: PathPrefix
        value: /etlservice
    backendRefs:
    - name: bold-etl-service
      port: 6009
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
